services:
  - type: web
    name: blackjack-educativo
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BLACKJACK_HISTORIAL_PATH
        value: data/historial_resultados.csv
